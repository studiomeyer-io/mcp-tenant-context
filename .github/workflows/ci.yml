name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22.x, 24.x]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Build dist/
        run: npm run build
      - name: Test
        run: npm test
      - name: Pack (dry-run, bundle-size check)
        run: npm pack --dry-run

  # Quality gates (run once). Coverage is enforced at 100%; publint lints the
  # package.json exports/files/manifest; are-the-types-wrong verifies type
  # resolution for every module condition against the actual tarball. The
  # cjs-resolves-to-esm rule is ignored on purpose — this package is ESM-only.
  quality:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
      - run: npm ci
      - name: Coverage (100% gate)
        run: npm run coverage
      - name: Build dist/
        run: npm run build
      - name: publint
        run: npx --yes publint@latest
      - name: Are the types wrong? (ESM-only)
        run: npx --yes @arethetypeswrong/cli@latest --pack --ignore-rules cjs-resolves-to-esm
